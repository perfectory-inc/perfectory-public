services:
  prometheus:
    image: prom/prometheus:v3.5.0@sha256:63805ebb8d2b3920190daf1cb14a60871b16fd38bed42b857a3182bc621f4996
    restart: unless-stopped
    read_only: true
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=1GB
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:${FOUNDATION_PROMETHEUS_PORT:-19090}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/foundation-api.rules.yml:/etc/prometheus/foundation-api.rules.yml:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      foundation-api:
        condition: service_healthy
      alertmanager:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:v0.28.1@sha256:27c475db5fb156cab31d5c18a4251ac7ed567746a2483ff264516437a39b15ba
    restart: unless-stopped
    read_only: true
    user: "65534:65534"
    security_opt:
      - no-new-privileges:true
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --data.retention=120h
    ports:
      - "127.0.0.1:${FOUNDATION_ALERTMANAGER_PORT:-19093}:9093"
    volumes:
      - alertmanager_data:/alertmanager
      - ./infra/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    tmpfs:
      - /tmp:size=16m,mode=1777
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:9093/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  prometheus_data:
  alertmanager_data:

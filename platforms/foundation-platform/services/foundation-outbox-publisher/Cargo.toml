[package]
name = "foundation-outbox-publisher"
version = "0.1.0"
edition.workspace = true
default-run = "foundation-outbox-publisher"
rust-version.workspace = true
license-file.workspace = true
authors.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
async-trait = { workspace = true }
bytes = { workspace = true }
catalog-application = { workspace = true }
catalog-domain = { workspace = true }
catalog-infrastructure = { workspace = true }
collection-domain = { workspace = true }
collection-application = { workspace = true }
collection-infrastructure = { workspace = true }
chrono = { workspace = true }
foundation-shared-kernel = { workspace = true }
lakehouse-application = { workspace = true }
lakehouse-domain = { workspace = true }
lakehouse-infrastructure = { workspace = true }
foundation-normalization-domain = { workspace = true }
foundation-normalization-application = { workspace = true }
foundation-normalization-infrastructure = { workspace = true }
parquet = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
futures-util = { workspace = true }
http-body = { workspace = true }
reqwest = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
sqlx = { workspace = true, features = ["runtime-tokio-rustls", "postgres"] }
foundation-outbox = { workspace = true }
outbound-http-infrastructure = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
zip = { workspace = true }

[dev-dependencies]
wiremock = { workspace = true }

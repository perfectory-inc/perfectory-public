name: secret-scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    # Stable branch-ruleset context. Step names retain the human detail.
    name: required/secrets
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: gitleaks (worktree and full history, root config)
        run: bash scripts/ci/gitleaks-scan.sh all .

name: foundation_lakehouse
version: "1.0.0"
config-version: 2

profile: foundation_lakehouse

flags:
  require_certificate_validation: true

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

clean-targets:
  - target
  - dbt_packages

models:
  foundation_lakehouse:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    silver:
      +materialized: table
      +schema: silver

name: monorepo-guard
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read

concurrency:
  group: monorepo-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: required/repository
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - run: bash scripts/guard/monorepo-guard.sh
      - name: REUSE license compliance
        run: bash scripts/ci/reuse-lint.sh

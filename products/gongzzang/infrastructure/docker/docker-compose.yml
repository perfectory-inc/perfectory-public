# OCI index digests resolved from the named Docker Hub tags with
# `docker buildx imagetools inspect` on 2026-07-23.
services:
  postgres:
    image: postgis/postgis:17-3.5@sha256:404171ea9058c801f405af25d63b3b8e5c9e50f2759e49390dbcc3c7ee533f4d
    container_name: gongzzang-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gongzzang}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-gongzzang}
    ports: ["127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gongzzang}"]
      interval: 5s
      timeout: 3s
      retries: 10
  valkey:
    image: valkey/valkey:8-alpine@sha256:a038175878d66b9d274fbf8be73c0305e93798b83917647f167e18cef3c71eec
    container_name: gongzzang-valkey
    ports: ["127.0.0.1:${VALKEY_HOST_PORT:-6379}:6379"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres-data:

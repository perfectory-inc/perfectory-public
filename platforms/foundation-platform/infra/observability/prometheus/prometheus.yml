global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/foundation-api.rules.yml

scrape_configs:
  - job_name: foundation-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - foundation-api:8080
        labels:
          environment: prelaunch
          platform: foundation-platform

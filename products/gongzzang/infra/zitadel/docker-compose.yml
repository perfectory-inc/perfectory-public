# Dev-only docker-compose. Production 은 SP6-iam-infra 가 Pulumi 화.
# Ports 18443 (zitadel), 15433 (postgres) 은 Windows Hyper-V exclusion 회피용.
# Linux/macOS 사용자는 표준 8443/5433 으로 변경 가능 (단 .env.local + init-zitadel.sh
# 의 ZITADEL_HOST 도 일관 변경 필요).

# OCI index digests resolved from the named registry tags with
# `docker buildx imagetools inspect` on 2026-07-23.
services:
  zitadel-db:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_USER: zitadel
      POSTGRES_PASSWORD: ${ZITADEL_DB_PASSWORD:?set ZITADEL_DB_PASSWORD in the untracked env file}
      POSTGRES_DB: zitadel
    volumes:
      - zitadel-db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${ZITADEL_DB_HOST_PORT:-15433}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "zitadel"]
      interval: 5s
      timeout: 5s
      retries: 10

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.65.1@sha256:013d23b69aa681f03d36a7fd61e4837a7b049a7e22bd7215eb3e98e9dbf5543c
    command:
      - start-from-init
      - --masterkeyFromEnv
      - --tlsMode
      - disabled
      # zitadel-setup.yaml 의 Machine user + PAT 생성 적용 (init-zitadel.sh 가 PAT 사용).
      - --steps
      - /zitadel-setup.yaml
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:?set a 32-character ZITADEL_MASTERKEY in the untracked env file}
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD:?set ZITADEL_DB_PASSWORD in the untracked env file}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD:?set ZITADEL_DB_PASSWORD in the untracked env file}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: "${ZITADEL_HOST_PORT:-18443}"
      # FirstInstance admin user — env-based (zitadel-setup.yaml 의 --config flag 가 v2.65.1 에서 적용 안 됨)
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD:?set ZITADEL_ADMIN_PASSWORD in the untracked env file}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: Gongzzang
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ZITADEL_ADMIN_EMAIL:-admin@zitadel.localhost}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
    volumes:
      - ./zitadel-setup.yaml:/zitadel-setup.yaml:ro
      - zitadel-init-pat:/pat-out
    ports:
      - "127.0.0.1:${ZITADEL_HOST_PORT:-18443}:8080"
    depends_on:
      zitadel-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/debug/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${ZITADEL_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  zitadel-db:
  redis-data:
  # PAT written by Zitadel first-boot; consumed by init-zitadel.sh
  zitadel-init-pat:

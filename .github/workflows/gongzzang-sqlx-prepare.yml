name: sqlx-prepare

on:
  push:
    branches: [main]
    paths:
      - "products/gongzzang/**"
      - ".github/workflows/gongzzang-sqlx-prepare.yml"
  pull_request:
    branches: [main]
    # Intentionally unfiltered so required/gongzzang-sqlx always reports.

defaults:
  run:
    working-directory: products/gongzzang

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  POSTGRES_USER: gongzzang
  POSTGRES_PASSWORD: ci_only_changeme
  POSTGRES_DB: gongzzang

jobs:
  drift-check:
    name: SQLx offline metadata check
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine@sha256:fe9821935d163abca5611e3e0a6a7c73c8c547f3412ed2036ec0ed8f789390da
        env:
          POSTGRES_USER: gongzzang
          POSTGRES_PASSWORD: ci_only_changeme
          POSTGRES_DB: gongzzang
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gongzzang"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://gongzzang:ci_only_changeme@localhost:5432/gongzzang

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6.0.2 (SHA pin, ADR 0028)
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@21dc36fb71dd22e3317045c0c31a3f4249868b17  # @stable (SHA pin, ADR 0028)
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1 (SHA pin, ADR 0028)
        with:
          shared-key: sqlx-cli
          workspaces: products/gongzzang

      - name: Install sqlx-cli + postgres client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
          cargo install sqlx-cli --version 0.8.6 --locked --no-default-features --features postgres,rustls

      - name: Wait for Postgres
        run: |
          for _ in {1..30}; do
            pg_isready -h localhost -p 5432 -U gongzzang && break
            sleep 1
          done

      - name: Apply migrations
        run: sqlx migrate run --source migrations

      # Native replacement for the deleted sqlx_prepare_verification graph-build
      # target. That target only statically validated .sqlx/query-*.json shape
      # because its sandbox had no database. Against a live migrated DB we run the
      # real drift check: regenerate offline metadata and fail if it differs from
      # what is committed (i.e. someone changed a query! without re-running prepare).
      - name: Check committed SQLx metadata is current
        run: cargo sqlx prepare --workspace --check

  required:
    name: required/gongzzang-sqlx
    if: ${{ always() }}
    needs: [drift-check]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require the SQLx gate
        env:
          REQUIRED_RESULT_DRIFT_CHECK: ${{ needs.drift-check.result }}
        run: bash scripts/ci/require-successful-needs.sh

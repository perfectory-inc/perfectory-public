[package]
name = "foundation-outbox"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license-file.workspace = true
authors.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
aws-credential-types = "1"
aws-sdk-s3 = { version = "1", default-features = false, features = ["rt-tokio", "default-https-client"] }
chrono = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
sha2 = { workspace = true }
sqlx = { workspace = true, features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "macros"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs", "io-util", "sync", "time", "macros"] }
tracing = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
foundation-shared-kernel = { workspace = true }
foundation-contracts = { workspace = true }
lakehouse-domain = { workspace = true }
catalog-application = { workspace = true }
catalog-domain = { workspace = true }
catalog-infrastructure = { workspace = true }
